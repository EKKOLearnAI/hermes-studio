services:
  hermes-webui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${HERMES_AGENT_IMAGE:-nousresearch/hermes-agent:latest}
    image: ${WEBUI_IMAGE:-hermes-web-ui-local:latest}
    container_name: ${WEBUI_CONTAINER_NAME:-hermes-webui}
    user: root
    ports:
      - "${PORT:-6060}:${PORT:-6060}"
      - "8642-8670:8642-8670"
    volumes:
      - ${HERMES_DATA_DIR:-./hermes_data}:/home/agent/.hermes:z
      - ${HERMES_DATA_DIR:-./hermes_data}/hermes-web-ui:/home/agent/.hermes-web-ui:z
      - ${HERMES_DATA_DIR:-./hermes_data}/workspace:/home/agent/workspace:z
    environment:
      - PORT=${PORT:-6060}
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - HERMES_ALLOW_ROOT_GATEWAY=1
      - GATEWAY_DEFAULT_HOST=127.0.0.1
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    restart: unless-stopped
    stdin_open: true
    tty: true
