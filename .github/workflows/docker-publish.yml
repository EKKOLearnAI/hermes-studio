name: Build & Push Docker (Multi-arch)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 【关键】安装 QEMU 模拟器，用来在 amd64 主机上模拟 arm64 环境[reference:2]
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 【关键】初始化 Buildx，并显式指定为 'docker-container' 驱动
      #    这是支持多平台构建的唯二要求之一。同时显式声明你要构建的平台[reference:3]
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          platforms: linux/amd64,linux/arm64

      # 4. 登录 Docker Hub（Secret 名已修正，请和你仓库里的一致）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 平台列表要和 setup-buildx 中声明的匹配
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hermes-web-ui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hermes-web-ui:v0.5.5
