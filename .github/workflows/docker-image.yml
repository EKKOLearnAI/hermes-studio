name: Docker Build and Push

on:
  push:
    branches:
      - main  # 当 main 分支有推送时触发
    tags:
      - 'v*'  # 当推送版本标签时也触发
  pull_request:
    branches:
      - main  # 可选：当对 main 分支发起 PR 时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 运行环境

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # 检出代码

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3  # 启用 Buildx 用于构建

      - name: Log in to Docker Hub
        uses: docker/login-action@v3  # 登录到 Docker Hub
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5  # 构建并推送镜像
        with:
          context: .  # 构建上下文为根目录
          file: ./Dockerfile  # 指定 Dockerfile 路径
          push: true  # 构建后推送到仓库
          tags: |
            ${{ secrets.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}
